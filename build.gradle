import net.darkhax.curseforgegradle.TaskPublishCurseForge
//2025 copyright some gradle setting from Create : https://github.com/Creators-of-Create/Create


plugins {

    id 'net.neoforged.moddev' version '2.0.107'
    id 'java-library'
    id 'maven-publish'
    id 'net.darkhax.curseforgegradle' version '[1.1.24,)'
    id "dev.ithundxr.silk" version "0.11.15"
    id "me.modmuss50.mod-publish-plugin" version "1.0.0"
    id "idea"

}


apply from: "./gradle/java.gradle"
apply from: "gradle/property_loader.gradle"

ext.mod_version = "${mod_release_version}-${mod_create_compat_version}"


group = mod_group_id
version = mod_version
archivesBaseName = mod_id
String gitHash = "${calculateGitHash() + (hasUnstaged() ? "-modified" : "")}"

idea {
    module {
        downloadJavadoc = true
        downloadSources = true
    }
}

//apply plugin: 'org.spongepowered.mixin'


base {
    archivesName = mod_id
}

repositories {
    mavenLocal()
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

neoForge {
    version = project.neo_version   // 在 gradle.properties 中定义

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG

            // 如果您使用了 Mixin，请添加以下参数（配置文件名与清单中的一致）
            programArgument '-mixin.config=createlazytick.mixins.json'
        }
    }

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

tasks.withType(Copy).configureEach {
    // 确保这里的配置是正确的
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

