var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            neo_version_range      : neo_version_range,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            mod_authors            : mod_authors,
            mod_description        : mod_description
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

compileJava {
    options.compilerArgs = ['-Xdiags:verbose']
}

jar {
    archiveFileName = "${mod_id}-${mod_version}-neoforge-${minecraft_version}.jar"
    from('LICENSE.txt') {
        rename { "${it}_${archivesBaseName}" }

    }
    manifest.attributes([
            "MixinConfigs": "createlazytick.mixins.json",
            "Git-Hash"    :  gitHash
    ])

}

tasks.register('PublishInfo') {
    doLast {
        println "Reobfuscated JAR file path: ${reobfJar.archiveFile.get().asFile.absolutePath}"
        println "version = \"$minecraft_version-$mod_version\"\n" +
                "    displayName = \"${display_name}_v${mod_release_version}_for_Create_v${mod_create_compat_version}\""
        def propertiesFile = file('api.properties')
        if (propertiesFile.exists()) {
            def properties = new Properties()
            properties.load(new FileInputStream(propertiesFile))
            def cfToken = properties.getProperty("CF_TOKEN")
            def modrinthToken = properties.getProperty("MODRINTH_TOKEN")

            println "CF_TOKEN: $cfToken"
            println "MODRINTH_TOKEN: $modrinthToken"
        } else {
            println "api.properties not exist"
        }
    }
    group = 'Publishing'
}

tasks.register('publishAll') {
    dependsOn 'publishCurseForge'
    dependsOn 'publishMods'
    group = 'Publishing'
}









