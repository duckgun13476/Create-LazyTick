modLoader = "javafml" #mandatory
loaderVersion = "[47,)" #mandatory This is typically bumped every Minecraft version by Forge. See our download page for lists of versions.
license = "MIT"


[[mods]] #mandatory
modId = "${mod_id}" #mandatory
logoFile="icon.png"
version = "${mod_version}" #mandatory
displayName = "${mod_name}" #mandatory
authors = "${mod_authors}" #optional
description = '''${mod_description}'''


[[dependencies."${mod_id}"]]
    modId = "forge"
    mandatory = true
    versionRange = "[47.0.0,)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies."${mod_id}"]]
    modId = "minecraft"
    mandatory = true
    versionRange = "[1.20,1.21)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies."${mod_id}"]]
    modId="create"
    mandatory=true
    versionRange="[6.0.0,)"
    ordering="NONE"
    side="BOTH"

[[mixins]]
    config = "createlazytick.mixins.json"